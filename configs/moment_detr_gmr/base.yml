seed: 2023
device: cuda
num_workers: 4

lr: 0.00005
lr_drop: 400
wd: 0.0001
n_epoch: 400
max_es_cnt: 50
bsz: 8
eval_bsz: 4
grad_clip: 0.1
max_q_l: 32
max_v_l: 75
max_a_l: 75
max_windows: 8
clip_length: 2
eval_epoch_interval: 1

position_embedding: sine
enc_layers: 2
dec_layers: 2
dim_feedforward: 1024
hidden_dim: 256
input_dropout: 0.5
dropout: 0.1
nheads: 8
num_queries: 10

n_input_proj: 2
saliency_margin: 0.2
span_loss_type: l1
set_cost_span: 10
set_cost_giou: 1
set_cost_class: 4
span_loss_coef: 10
giou_loss_coef: 1
label_loss_coef: 4
eos_coef: 0.1
lw_saliency: 1

use_exist_head: false
exist_pool: max
exist_loss_coef: 1.0
exist_gate_thd: 0.3

# Keep the release-compatible text layout by default. New controlled variants
# enable trimming so EOS and lexical masks follow the stored CLIP mask.
trim_text_by_attention_mask: false

# HieA2M components. Variants are selected by the training CLI; all optional
# branches remain disabled for the released Moment-DETR(-GMR) baselines.
use_quality_head: false
quality_loss_coef: 1.0
quality_score_alpha: 0.5

use_dual_grounding: false
dual_num_phrases: 3
dual_num_dummies: 3
dual_slot_iterations: 1
dual_gate_init: -4.0
dual_nheads: 8
dual_dqa_scale: 0.3
dual_eos_temperature: 0.07
dual_dqa_loss_coef: 0.05
dual_eos_loss_coef: 0.1

use_hierarchical_counter: false
counter_dropout: 0.1
counter_detach_scores: true
count_loss_coef: 1.0
count_ordinal_loss_coef: 0.25
count_contrastive_loss_coef: 0.05
count_consistency_loss_coef: 0.05
counter_contrastive_temperature: 0.1

# Two-stage null verification and learned same-event selection.  These remain
# disabled for every legacy variant/checkpoint.
use_independent_zero_head: false
zero_loss_coef: 1.0
zero_positive_query_weight: 2.0
use_pairwise_head: false
pairwise_loss_coef: 1.0
pair_assignment_iou: 0.3
pair_ambiguity_margin: 0.05
pair_positive_weight: 1.0
pair_hard_negative_weight: 2.0
pairwise_detach_inputs: true
selector_dropout: 0.1

# Stage decision and learned set-selection controls.
exist_score_mode: gate
gate_recall_thd: 0.3
zero_decision_thd: 0.6
zero_veto_thd: 0.7
zero_localization_thd: 0.2
set_selection_mode: legacy
selection_k: 3
selection_max_output: 10
pairwise_redundancy_lambda: 1.0
count_prior_weight: 0.5
selection_stop_thd: -1.0
same_event_thd: 0.8
fusion_boundary_std_thd: 0.03

# Set decoding. ``full`` preserves all ten queries; ``adaptive`` applies the
# HieA2G-style hierarchical count after diversity-aware ranking.
decode_mode: full
diversity_lambda: 0.0
count_exist_thd: 0.4
count_confidence_thd: 0.55
window_score_thd: 0.1
round_to_clip: true
save_raw_queries: false
gmiou_cls_threshold: 0.4
cls_thresholds: [0.4, 0.6, 0.8]
eval_k_list: [1, 3, 5]
max_pred_windows: 10
map_num_workers: 8
backbone_lr_scale: 0.1
selection_metric: mAP
reference_map: 0.0
reference_gmiou3: 0.0

ckpt_filename: best.ckpt
train_log_filename: train.log
eval_log_filename: val.log
eval_split_name: val
aux_loss: true
mask_null_vmr_loss: false

model_ema: false
ema_decay: 0.9
results_dir: results
